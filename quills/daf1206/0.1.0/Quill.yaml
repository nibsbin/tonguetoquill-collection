Quill:
  name: daf1206
  version: 0.1.0
  backend: typst
  plate_file: plate.typ
  example_file: example.md
  description: "DAF Form 1206 — Nomination for Award"

main:
  ui:
    hide_body: false
  fields:
    award:
      title: Award
      type: string
    category_if_applicable:
      title: Category (If Applicable)
      type: string
    award_period:
      title: Award Period
      type: string
    rankname_of_nominee:
      title: Rank/Name of Nominee (First, Middle Initial, Last)
      type: string
    majcom_fldcom_foa_or_dru:
      title: MAJCOM/FLDCOM/FOA/DRU
      type: string
    dafsc_duty_title:
      title: DAFSC/Duty Title
      type: string
    nominees_telephone_dsn_commercial:
      title: Nominee's Telephone (DSN/Commercial)
      type: string
    unit_office_symbol_street_address_base_state_zip:
      title: Unit/Office Symbol/Street Address/Base/State/Zip Code
      type: string
    unit_commander_rank_name_and_telephone:
      title: Rank/Name of Unit Commander & Telephone (DSN/Commercial)
      type: string

cards:
  accomplishments_continued:
    title: Specific Accomplishments (Continued — Page 2)
    description: Optional. Add this card only when page 2 overflow is required. Use the card body for continued bullets. Rank/name on page 2 matches the main nominee line automatically.
    ui:
      hide_body: false
    fields: {}
